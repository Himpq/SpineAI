<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>患者随访入口</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --line: #e5e7eb;
      --ink: #0f172a;
      --muted: #64748b;
      --dark: #050505;
      --dark-hover: #1a1a1a;
      --dark-active: #ffffff;
      --dark-active-ink: #000000;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      margin: 0;
      font-family: "Inter", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--ink);
      overflow: hidden;
    }

    .portal-shell {
      width: 100%;
      height: 100vh;
      display: flex;
    }

    .portal-sidebar {
      width: 260px;
      background: var(--dark);
      color: #a0a0a0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      border-right: 1px solid #111;
    }

    .sidebar-head {
      min-height: 64px;
      display: flex;
      align-items: center;
      padding: 20px;
      border-bottom: 1px solid #151515;
    }

    .brand {
      font-size: 18px;
      color: #fff;
      font-weight: 600;
      letter-spacing: -0.4px;
    }

    .sidebar-sub {
      font-size: 11px;
      color: #94a3b8;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 12px 18px 6px;
    }

    .menu-list {
      display: grid;
      gap: 4px;
      padding: 0 10px;
      align-content: start;
    }

    .menu-item {
      border: 0;
      background: transparent;
      color: #a0a0a0;
      min-height: 40px;
      border-radius: 6px;
      text-align: left;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .menu-item i {
      width: 16px;
      text-align: center;
      font-size: 13px;
      opacity: .9;
    }

    .menu-item:hover {
      background: var(--dark-hover);
      color: #fff;
    }

    .menu-item.active {
      background: var(--dark-active);
      color: var(--dark-active-ink);
    }

    .menu-item .menu-badge {
      margin-left: auto;
      min-width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #ef4444;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
    }

    .menu-item .menu-badge.hidden {
      display: none !important;
    }

    .sidebar-foot {
      margin-top: auto;
      padding: 12px;
      border-top: 1px solid #151515;
      color: #64748b;
      font-size: 12px;
    }

    .portal-main {
      flex: 1;
      min-width: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    .portal-header {
      height: 60px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      gap: 10px;
      flex-shrink: 0;
    }

    .header-left,
    .header-right {
      width: 200px;
      display: flex;
      align-items: center;
    }

    .header-right {
      justify-content: flex-end;
    }

    .header-center {
      flex: 1;
      text-align: center;
    }

    .header-title {
      font-size: 14px;
      font-weight: 500;
      color: #000;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-meta {
      font-size: 12px;
      color: #475569;
      border: 1px solid #d8dee6;
      border-radius: 999px;
      padding: 5px 10px;
      background: #f8fafc;
      white-space: nowrap;
    }

    .portal-stage {
      flex: 1;
      min-height: 0;
      padding: 24px;
      background: #fff;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
    }

    .patient-profile {
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .patient-profile.compact {
      width: 100%;
      max-width: 420px;
      min-height: 74px;
    }

    .patient-name {
      font-size: 14px;
      font-weight: 600;
      color: #0f172a;
      letter-spacing: .01em;
    }

    .patient-sub {
      font-size: 12px;
      color: #64748b;
    }

    .panel {
      display: none;
      min-height: 0;
      grid-template-rows: minmax(0, 1fr);
      gap: 10px;
    }

    .panel.active { display: grid; }

    .panel-head {
      display: none;
    }

    .panel-head h2 {
      font-size: 17px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: .01em;
    }

    .panel-scroll {
      min-height: 0;
      overflow: auto;
      display: grid;
      gap: 10px;
      align-content: start;
      padding-right: 2px;
    }

    .card {
      background: var(--panel);
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .drop-zone {
      min-height: 220px;
      border: 1px dashed #c9d2dd;
      border-radius: 12px;
      background: linear-gradient(180deg, #fbfcfe 0%, #f2f6fa 100%);
      display: grid;
      place-items: center;
      text-align: center;
      color: #334155;
      cursor: pointer;
      padding: 16px;
      transition: all .15s ease;
    }

    .drop-zone strong { color: #0f172a; font-size: 15px; }
    .drop-zone .hint { color: #64748b; font-size: 12px; margin-top: 6px; }

    .drop-zone.dragover {
      border-color: #111827;
      background: #eef2f7;
      box-shadow: inset 0 0 0 1px #111827;
    }

    .drop-zone.has-preview {
      padding: 10px;
    }

    .drop-zone-placeholder {
      display: block;
    }

    .drop-zone-preview-wrap {
      display: none;
      width: 100%;
      height: 100%;
      min-height: 196px;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .drop-zone.has-preview .drop-zone-placeholder {
      display: none;
    }

    .drop-zone.has-preview .drop-zone-preview-wrap {
      display: flex;
    }

    .drop-zone-preview {
      max-width: 100%;
      max-height: 196px;
      object-fit: contain;
      border-radius: 10px;
      border: 1px solid #dbe2ea;
      background: #fff;
    }

    .drop-zone-preview-name {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 8px;
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.66);
      color: #fff;
      font-size: 12px;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .upload-progress {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
      display: none;
    }

    .upload-progress.show {
      display: block;
    }

    .upload-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #111827 0%, #475569 100%);
      transition: width .18s ease;
    }

    input[type="file"], input, textarea {
      width: 100%;
      min-height: 40px;
      border: 1px solid #d6dde6;
      border-radius: 9px;
      padding: 8px 10px;
      color: #0f172a;
      background: #fff;
      font-size: 13px;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #111827;
      box-shadow: 0 0 0 2px rgba(17, 24, 39, .1);
    }

    .btn {
      min-height: 38px;
      border: 1px solid #111827;
      background: #111827;
      color: #fff;
      border-radius: 9px;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover { background: #000; border-color: #000; }
    .btn.danger { background: #dc2626; border-color: #dc2626; }
    .btn.danger:hover { background: #b91c1c; border-color: #b91c1c; }

    .status {
      min-height: 36px;
      border-radius: 8px;
      border: 1px solid #dbe2ea;
      background: #f8fafc;
      color: #334155;
      font-size: 12px;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }

    .status.ok { border-color: #bbf7d0; background: #f0fdf4; color: #166534; }
    .status.err { border-color: #fecaca; background: #fef2f2; color: #991b1b; }

    .list {
      display: grid;
      gap: 8px;
      max-height: 100%;
      overflow: auto;
      padding-right: 2px;
      grid-template-columns: 1fr;
    }

    .list-upload {
      grid-template-columns: 1fr;
    }

    .list-timeline {
      grid-template-columns: 1fr;
    }

    .item {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 6px;
    }

    .item .title { font-size: 13px; font-weight: 600; color: #0f172a; }
    .item .meta { font-size: 12px; color: #64748b; }
    .item a { color: #0f172a; font-size: 12px; }

    .upload-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .upload-item {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .upload-preview {
      width: 100%;
      height: 164px;
      object-fit: cover;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #f8fafc;
      cursor: zoom-in;
    }

    .upload-body {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .upload-actions {
      display: flex;
      justify-content: flex-start;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 156px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      border-left: 0;
      padding-left: 0;
    }

    .timeline-item.warn {
      border-color: #fcd34d;
      background: #fffbeb;
    }

    .timeline-thumb {
      width: 100%;
      height: 112px;
      border-radius: 8px;
      border: 1px solid #dbe2ea;
      background: #f8fafc;
      overflow: hidden;
      display: grid;
      place-items: center;
      color: #64748b;
    }

    .timeline-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: zoom-in;
    }

    .timeline-data {
      min-width: 0;
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .home-layout {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 12px;
    }

    .home-overview {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .home-metric {
      border: 1px solid #d9dde2;
      border-radius: 12px;
      background: linear-gradient(180deg, #ffffff 0%, #fafbfc 100%);
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .home-metric .label {
      font-size: 12px;
      color: #64748b;
    }

    .home-metric .value {
      font-size: 30px;
      font-weight: 700;
      color: #0f172a;
      line-height: 1.1;
    }

    .home-main {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 12px;
    }

    .home-side {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      align-content: start;
    }

    .home-placeholder {
      min-height: 0;
      border: 1px dashed #cfd8e3;
      border-radius: 12px;
      background: #f8fafc;
      padding: 12px;
      color: #64748b;
      font-size: 13px;
      display: grid;
      align-content: start;
      gap: 6px;
    }

    .portal-chat-view {
      width: 100%;
      min-height: 0;
      height: 100%;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .portal-chat-list-pane {
      border-right: 1px solid #e2e8f0;
      display: grid;
      grid-template-rows: 68px minmax(0, 1fr);
      min-height: 0;
      background: #fbfbfc;
    }

    .portal-chat-pane-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid #e2e8f0;
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
    }

    .portal-chat-list {
      min-height: 0;
      overflow-y: auto;
      display: grid;
      gap: 10px;
      align-content: start;
      padding: 12px;
    }

    .portal-chat-item {
      border: 1px solid #dde3eb;
      border-radius: 12px;
      padding: 12px 14px;
      background: #fff;
      cursor: pointer;
      transition: all .16s ease;
    }

    .portal-chat-item:hover {
      border-color: #c1ccd9;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
      transform: translateY(-1px);
    }

    .portal-chat-item.active {
      border-color: #0f172a;
      background: #f7f8fa;
    }

    .portal-chat-item-name {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 4px;
    }

    .portal-chat-item-meta {
      font-size: 12px;
      color: #64748b;
    }

    .portal-chat-main {
      min-height: 0;
      display: grid;
      grid-template-rows: 64px minmax(0, 1fr) 76px;
      background: #fff;
    }

    .portal-chat-titlebar {
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      font-size: 17px;
      font-weight: 700;
      color: #0f172a;
    }

    .portal-chat-messages {
      min-height: 0;
      overflow-y: auto;
      padding: 16px;
      display: grid;
      align-content: start;
      gap: 10px;
      background: #fafbfc;
    }

    .portal-chat-msg {
      width: fit-content;
      max-width: 72%;
      justify-self: start;
      border: 1px solid #e2e8f0;
      border-radius: 14px 14px 14px 6px;
      background: #fff;
      padding: 10px 12px;
      color: #0f172a;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
    }

    .portal-chat-msg.self {
      justify-self: end;
      border-radius: 14px 14px 6px 14px;
      background: #95ec69;
      border-color: #8fd16f;
      color: #0f172a;
      box-shadow: 0 4px 12px rgba(74, 222, 128, 0.26);
    }

    .portal-chat-msg-meta {
      font-size: 11px;
      opacity: .78;
      margin-top: 4px;
    }

    .portal-chat-share-card {
      display: grid;
      gap: 8px;
      min-width: 220px;
    }

    .portal-chat-share-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }

    .portal-chat-share-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 8px;
      border: 1px solid #dbe2ea;
      background: #fff;
      color: #0f172a;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
    }

    .portal-chat-input-row {
      border-top: 1px solid #e2e8f0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: #fff;
    }

    .portal-chat-empty {
      color: #64748b;
      text-align: center;
      padding: 20px;
      font-size: 13px;
    }

    .chat-panel-section {
      grid-template-rows: minmax(0, 1fr);
    }

    .chat-panel-scroll {
      padding: 0;
      min-height: 0;
      height: 100%;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.62);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 16px;
    }

    .modal.open { display: flex; }

    .modal img {
      max-width: min(96vw, 1280px);
      max-height: 88vh;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
      background: #fff;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid #fff;
      background: rgba(15,23,42,.65);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
    }

    @media (max-width: 980px) {
      .portal-shell { flex-direction: column; }
      .portal-sidebar {
        width: 100%;
        border-right: 0;
        border-bottom: 1px solid #111;
      }
      .sidebar-head { min-height: 56px; }
      .menu-list { grid-auto-flow: column; overflow-x: auto; padding-bottom: 10px; }
      .menu-item { min-width: 118px; }
      .sidebar-foot { display: none; }
      .portal-main { height: auto; }
      .portal-stage { padding: 12px; }
      .list-upload,
      .list-timeline { grid-template-columns: 1fr; }
      .upload-item { grid-template-columns: 1fr; }
      .upload-preview { height: auto; max-height: 220px; object-fit: contain; }
      .timeline-item { grid-template-columns: 1fr; }
      .timeline-thumb { height: 180px; }
      .home-overview { grid-template-columns: 1fr; }
      .home-main { grid-template-columns: 1fr; }
      .home-side { grid-template-rows: auto auto; }
      .patient-profile.compact { max-width: none; }
      .portal-chat-view { grid-template-columns: 1fr; height: auto; }
      .portal-chat-list-pane { grid-template-rows: auto minmax(0, 240px); }
    }
  </style>
</head>
<body>
<div class="portal-shell">
  <aside class="portal-sidebar">
    <div class="sidebar-head">
      <div class="brand">Spine FUPT.</div>
    </div>
    <div class="sidebar-sub">患者入口</div>
    <div class="menu-list" id="portal-menu">
      <button type="button" class="menu-item active" data-panel="home-panel"><i class="fa-solid fa-house"></i><span>首页</span></button>
      <button type="button" class="menu-item" data-panel="history-panel"><i class="fa-solid fa-images"></i><span>上传历史</span></button>
      <button type="button" class="menu-item" data-panel="timeline-panel"><i class="fa-solid fa-timeline"></i><span>时间线</span></button>
      <button type="button" class="menu-item" data-panel="chat-panel"><i class="fa-solid fa-comments"></i><span>在线聊天</span><span id="portal-chat-unread-badge" class="menu-badge hidden">0</span></button>
    </div>
    <div class="sidebar-foot">Portal</div>
  </aside>

  <main class="portal-main">
    <header class="portal-header">
      <div class="header-left"></div>
      <div class="header-center">
        <div id="portal-header-title" class="header-title">Spine FUPT · 患者中心 · 首页</div>
      </div>
      <div class="header-right">
        <div class="header-meta">Patient Portal</div>
      </div>
    </header>

    <section class="portal-stage">
      <section id="home-panel" class="panel active">
        <div class="panel-head"><h2>首页</h2></div>
        <div class="panel-scroll">
          <div class="home-layout">
            <div class="home-overview">
              <div class="home-metric">
                <div class="label">累计上传</div>
                <div id="home-upload-count" class="value">0</div>
              </div>
              <div class="home-metric">
                <div class="label">任务数</div>
                <div id="home-task-count" class="value">0</div>
              </div>
              <div class="home-metric">
                <div class="label">最近上传</div>
                <div id="home-last-upload" class="value" style="font-size:20px;">--</div>
              </div>
            </div>
            <div class="home-main">
              <div class="card">
                <div class="title">上传影像入口</div>
                <input id="upload-file" type="file" accept="image/*" hidden>
                <div id="drop-zone" class="drop-zone" role="button" tabindex="0">
                  <div class="drop-zone-placeholder">
                    <div><strong>拖拽图片到这里上传</strong></div>
                    <div class="hint">或点击此区域选择图片文件</div>
                  </div>
                  <div class="drop-zone-preview-wrap">
                    <img id="drop-zone-preview" class="drop-zone-preview" alt="上传预览">
                    <div id="drop-zone-preview-name" class="drop-zone-preview-name"></div>
                  </div>
                </div>
                <div id="upload-progress" class="upload-progress">
                  <div id="upload-progress-bar" class="upload-progress-bar"></div>
                </div>
                <button id="upload-btn" class="btn" type="button">上传</button>
                <div id="upload-result" class="status"></div>
              </div>
              <div class="home-side">
                <div class="patient-profile compact">
                  <div>
                    <div id="patient-name" class="patient-name">患者信息</div>
                    <div id="patient-meta" class="patient-sub">年龄：-  性别：-</div>
                  </div>
                </div>
                <div class="home-placeholder">
                  <div class="title">患者情况概览（占位）</div>
                  <div>后续可展示风险趋势、近期复核结果、治疗阶段。</div>
                  <div>当前仅完成基础布局，风格与医生端保持一致。</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="history-panel" class="panel">
        <div class="panel-head"><h2>上传历史</h2></div>
        <div class="panel-scroll">
          <div id="upload-list" class="list list-upload"></div>
        </div>
      </section>

      <section id="timeline-panel" class="panel">
        <div class="panel-head"><h2>时间线</h2></div>
        <div class="panel-scroll">
          <div id="timeline-list" class="list list-timeline"></div>
        </div>
      </section>

      <section id="chat-panel" class="panel chat-panel-section">
        <div class="panel-scroll chat-panel-scroll">
          <div class="portal-chat-view">
            <aside class="portal-chat-list-pane">
              <div class="portal-chat-pane-head">聊天好友</div>
              <div id="portal-chat-list" class="portal-chat-list"></div>
            </aside>
            <section class="portal-chat-main">
              <div id="portal-chat-title" class="portal-chat-titlebar">医疗团队</div>
              <div id="portal-chat-messages" class="portal-chat-messages"></div>
              <div class="portal-chat-input-row">
                <input id="portal-chat-input" type="text" placeholder="输入消息...">
                <button id="portal-chat-send" class="btn" type="button">发送</button>
              </div>
            </section>
          </div>
        </div>
      </section>
    </section>
  </main>
</div>

<div id="image-modal" class="modal" aria-hidden="true">
  <button id="modal-close" class="modal-close" type="button">×</button>
  <img id="modal-image" alt="影像预览">
</div>

<script>
const token = "{{ token }}";
const patientName = document.getElementById("patient-name");
const patientMeta = document.getElementById("patient-meta");
const portalHeaderTitle = document.getElementById("portal-header-title");
const uploadList = document.getElementById("upload-list");
const timelineList = document.getElementById("timeline-list");
const homeUploadCount = document.getElementById("home-upload-count");
const homeTaskCount = document.getElementById("home-task-count");
const homeLastUpload = document.getElementById("home-last-upload");
const portalChatUnreadBadge = document.getElementById("portal-chat-unread-badge");
const uploadResult = document.getElementById("upload-result");
const uploadFile = document.getElementById("upload-file");
const dropZone = document.getElementById("drop-zone");
const dropZonePreview = document.getElementById("drop-zone-preview");
const dropZonePreviewName = document.getElementById("drop-zone-preview-name");
const uploadProgress = document.getElementById("upload-progress");
const uploadProgressBar = document.getElementById("upload-progress-bar");
const imageModal = document.getElementById("image-modal");
const modalImage = document.getElementById("modal-image");
const portalChatList = document.getElementById("portal-chat-list");
const portalChatMessages = document.getElementById("portal-chat-messages");
const portalChatInput = document.getElementById("portal-chat-input");
const portalChatSend = document.getElementById("portal-chat-send");
const portalChatTitle = document.getElementById("portal-chat-title");
let latestUploads = [];

const chatState = {
  conversationId: null,
  channel: "",
  messages: [],
  contacts: [],
  ws: null,
  unread: 0,
};

function updatePortalChatUnreadBadge() {
  if (!portalChatUnreadBadge) return;
  const n = Math.max(0, Number(chatState.unread || 0));
  portalChatUnreadBadge.textContent = String(n);
  portalChatUnreadBadge.classList.toggle("hidden", n <= 0);
}

function api(path, options = {}) {
  return fetch(path, options).then(r => r.json());
}

function fmt(iso) {
  if (!iso) return "--";
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return "--";
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  const hh = String(d.getHours()).padStart(2, "0");
  const mi = String(d.getMinutes()).padStart(2, "0");
  return `${mm}-${dd} ${hh}:${mi}`;
}

function setUploadStatus(msg, ok = true) {
  uploadResult.textContent = msg || "";
  uploadResult.classList.remove("ok", "err");
  if (msg) uploadResult.classList.add(ok ? "ok" : "err");
}

function setUploadProgress(pct) {
  const n = Math.max(0, Math.min(100, Number(pct) || 0));
  uploadProgress?.classList.add("show");
  if (uploadProgressBar) {
    uploadProgressBar.style.width = `${n.toFixed(1)}%`;
  }
}

function clearUploadProgress() {
  uploadProgress?.classList.remove("show");
  if (uploadProgressBar) {
    uploadProgressBar.style.width = "0%";
  }
}

function setDropPreview(file) {
  if (!file) {
    dropZone?.classList.remove("has-preview");
    if (dropZonePreview) dropZonePreview.removeAttribute("src");
    if (dropZonePreviewName) dropZonePreviewName.textContent = "";
    return;
  }
  const reader = new FileReader();
  reader.onload = () => {
    if (dropZonePreview) {
      dropZonePreview.src = String(reader.result || "");
    }
    if (dropZonePreviewName) {
      dropZonePreviewName.textContent = file.name || "image";
    }
    dropZone?.classList.add("has-preview");
  };
  reader.readAsDataURL(file);
}

function renderUploads(items) {
  uploadList.innerHTML = (items || []).map(u => `
    <div class="item upload-item" data-exam-id="${u.id}">
      ${u.image_url ? `<img class="upload-preview" src="${u.image_url}" data-preview="${u.image_url}" alt="upload-${u.id}">` : `<div class="upload-preview"></div>`}
      <div class="upload-body">
        <div class="upload-head">
          <div class="title">${fmt(u.upload_date)} · ${u.status || "-"}</div>
          <div class="meta">${u.spine_class_text || "未分类"}${u.spine_class_confidence !== null && u.spine_class_confidence !== undefined ? ` · ${(Number(u.spine_class_confidence) * 100).toFixed(1)}%` : ""}</div>
        </div>
        <div class="meta">Cobb角：${u.cobb_angle ?? "-"}</div>
        <div class="meta">脊柱曲率：${u.curve_value ?? "-"}</div>
        <div class="meta">严重程度：${u.severity_label || "-"}</div>
        <div class="meta">改善值：${u.improvement_value ?? "-"}</div>
        <div class="meta">医生备注：${u.review_note || "暂无"}</div>
        <div class="meta">上传来源：${u.uploaded_by_kind === "patient" ? "本人" : (u.uploaded_by_label || u.uploaded_by_kind || "-")}</div>
        <div class="upload-actions">
          ${u.can_delete ? `<button type="button" class="btn danger" data-delete-exam="${u.id}">删除上传图</button>` : `<div class="meta">已复核影像不可删除</div>`}
        </div>
      </div>
    </div>
  `).join("") || "<div class='item'><div class='meta'>暂无上传记录</div></div>";
}

function renderTimeline(items) {
  timelineList.innerHTML = (items || []).map(t => `
    <div class="item timeline-item ${t.level === "warn" ? "warn" : ""}">
      <div class="timeline-thumb">
        ${(() => {
          const examId = Number(t.exam_id || 0);
          const up = latestUploads.find((u) => Number(u.id) === examId);
          return up && up.image_url
            ? `<img src="${up.image_url}" data-preview="${up.image_url}" alt="timeline-${examId}">`
            : `<i class="fa-regular fa-image"></i>`;
        })()}
      </div>
      <div class="timeline-data">
        <div class="title">${t.title || "系统事件"}</div>
        <div class="meta">${t.message || ""}</div>
        <div class="meta">${fmt(t.created_at)}</div>
      </div>
    </div>
  `).join("") || "<div class='item'><div class='meta'>暂无时间线</div></div>";
}

function bindPanelMenu() {
  const menu = document.getElementById("portal-menu");
  menu?.addEventListener("click", (event) => {
    const btn = event.target.closest(".menu-item[data-panel]");
    if (!btn) return;
    const panelId = btn.getAttribute("data-panel");
    const panelName = btn.querySelector("span")?.textContent?.trim() || "首页";
    document.querySelectorAll(".menu-item[data-panel]").forEach((i) => i.classList.toggle("active", i === btn));
    document.querySelectorAll(".panel").forEach((panel) => panel.classList.toggle("active", panel.id === panelId));
    if (portalHeaderTitle) {
      portalHeaderTitle.textContent = `Spine FUPT · 患者中心 · ${panelName}`;
    }
    if (panelId === "chat-panel") {
      chatState.unread = 0;
      updatePortalChatUnreadBadge();
      loadChat();
    }
  });
}

function openImageModal(src) {
  if (!src) return;
  modalImage.src = src;
  imageModal.classList.add("open");
  imageModal.setAttribute("aria-hidden", "false");
}

function closeImageModal() {
  imageModal.classList.remove("open");
  imageModal.setAttribute("aria-hidden", "true");
  modalImage.removeAttribute("src");
}

function bindUploadDnD() {
  const onDragEnter = (event) => {
    event.preventDefault();
    dropZone.classList.add("dragover");
  };
  const onDragOver = (event) => {
    event.preventDefault();
    dropZone.classList.add("dragover");
  };
  const onDragLeave = (event) => {
    event.preventDefault();
    if (!dropZone.contains(event.relatedTarget)) {
      dropZone.classList.remove("dragover");
    }
  };
  const onDrop = (event) => {
    event.preventDefault();
    dropZone.classList.remove("dragover");
    const files = event.dataTransfer?.files;
    if (!files || !files.length) return;
    uploadFile.files = files;
    setUploadStatus(`已选择：${files[0].name}`, true);
    setDropPreview(files[0]);
  };

  dropZone.addEventListener("dragenter", onDragEnter);
  dropZone.addEventListener("dragover", onDragOver);
  dropZone.addEventListener("dragleave", onDragLeave);
  dropZone.addEventListener("drop", onDrop);
  dropZone.addEventListener("click", () => uploadFile.click());
  dropZone.addEventListener("keydown", (event) => {
    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      uploadFile.click();
    }
  });

  uploadFile.addEventListener("change", () => {
    if (uploadFile.files && uploadFile.files.length) {
      setUploadStatus(`已选择：${uploadFile.files[0].name}`, true);
      setDropPreview(uploadFile.files[0]);
    } else {
      setDropPreview(null);
    }
  });
}

function getWsUrl() {
  const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
  return `${proto}//${window.location.host}/ws`;
}

function renderChatContacts() {
  if (!portalChatList) return;
  const rows = Array.isArray(chatState.contacts) ? chatState.contacts : [];
  if (!rows.length) {
    portalChatList.innerHTML = `<div class="portal-chat-empty">暂无可用聊天对象</div>`;
    return;
  }
  portalChatList.innerHTML = rows.map((c, idx) => `
    <div class="portal-chat-item ${idx === 0 ? "active" : ""}">
      <div class="portal-chat-item-name">${c.name || "-"}</div>
      <div class="portal-chat-item-meta">${c.role || ""}</div>
    </div>
  `).join("");
}

function renderChatMessages() {
  if (!portalChatMessages) return;
  const rows = Array.isArray(chatState.messages) ? chatState.messages : [];
  if (!rows.length) {
    portalChatMessages.innerHTML = `<div class="portal-chat-empty">暂无聊天记录，开始发送第一条消息</div>`;
    return;
  }
  const renderBody = (m) => {
    const mtype = String(m?.message_type || "text");
    const payload = m && typeof m.payload === "object" ? m.payload : {};
    if (mtype === "questionnaire_share") {
      const title = payload.questionnaire_title || m.content || "问卷任务";
      const url = payload.share_url || "";
      return `
        <div class="portal-chat-share-card">
          <div class="portal-chat-share-title"><i class="fa-solid fa-clipboard-question"></i><span>${title}</span></div>
          <a class="portal-chat-share-link" href="${url}" target="_blank" rel="noopener noreferrer">打开问卷</a>
        </div>
      `;
    }
    return `<div>${m.content || ""}</div>`;
  };
  portalChatMessages.innerHTML = rows.map((m) => {
    const self = m.sender_kind === "patient";
    return `
      <div class="portal-chat-msg ${self ? "self" : ""}">
        ${renderBody(m)}
        <div class="portal-chat-msg-meta">${m.sender_name || "-"} · ${fmt(m.created_at)}</div>
      </div>
    `;
  }).join("");
  portalChatMessages.scrollTop = portalChatMessages.scrollHeight;
}

function connectChatWs() {
  if (!chatState.channel) return;
  if (chatState.ws && (chatState.ws.readyState === WebSocket.OPEN || chatState.ws.readyState === WebSocket.CONNECTING)) return;
  const ws = new WebSocket(getWsUrl());
  chatState.ws = ws;
  ws.addEventListener("open", () => {
    ws.send(JSON.stringify({ type: "hello", kind: "patient", name: patientName?.textContent || "患者" }));
    ws.send(JSON.stringify({ type: "subscribe", channel: chatState.channel }));
  });
  ws.addEventListener("message", (event) => {
    let msg = null;
    try { msg = JSON.parse(event.data || "{}"); } catch (_e) {}
    if (!msg || msg.type !== "chat_message" || !msg.message) return;
    const exists = chatState.messages.some((m) => Number(m.id) === Number(msg.message.id));
    if (exists) return;
    chatState.messages.push(msg.message);
    const isSelf = String(msg.message.sender_kind || "") === "patient";
    const chatActive = Boolean(document.querySelector('.menu-item[data-panel="chat-panel"]')?.classList.contains("active"));
    if (!isSelf && !chatActive) {
      chatState.unread = Number(chatState.unread || 0) + 1;
      updatePortalChatUnreadBadge();
    }
    renderChatMessages();
  });
  ws.addEventListener("close", () => {
    chatState.ws = null;
  });
}

async function loadChat() {
  const res = await api(`/api/public/portal/${token}/chat`);
  if (!res.ok) return;
  const data = res.data || {};
  chatState.conversationId = data.conversation?.id || null;
  chatState.channel = data.conversation?.channel || "";
  chatState.messages = Array.isArray(data.messages) ? data.messages : [];
  chatState.contacts = Array.isArray(data.contacts) ? data.contacts : [];
  portalChatTitle.textContent = data.conversation?.name || "医疗团队";
  renderChatContacts();
  renderChatMessages();
  connectChatWs();
}

async function sendChatMessage() {
  const text = (portalChatInput?.value || "").trim();
  if (!text) return;
  const res = await api(`/api/public/portal/${token}/messages`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ content: text }),
  });
  if (!res.ok) return;
  portalChatInput.value = "";
}

function uploadWithProgress(file) {
  return new Promise((resolve) => {
    const fd = new FormData();
    fd.append("file", file);
    const xhr = new XMLHttpRequest();
    xhr.open("POST", `/api/public/portal/${token}/exams`, true);
    xhr.upload.addEventListener("progress", (event) => {
      if (!event.lengthComputable) return;
      setUploadProgress((event.loaded / event.total) * 100);
    });
    xhr.onload = () => {
      let payload = {};
      try { payload = JSON.parse(xhr.responseText || "{}"); } catch (_err) {}
      resolve(payload);
    };
    xhr.onerror = () => resolve({ ok: false, error: { message: "网络异常" } });
    xhr.send(fd);
  });
}

async function loadPortal() {
  const res = await api(`/api/public/portal/${token}`);
  if (!res.ok) {
    patientName.textContent = "入口失效";
    return;
  }
  const data = res.data || {};
  const uploads = Array.isArray(data.uploads) ? data.uploads : [];
  latestUploads = uploads;
  patientName.textContent = data.patient?.name || "患者入口";
  patientMeta.textContent = `年龄：${data.patient?.age || "-"}  性别：${data.patient?.sex || "-"}`;
  if (homeUploadCount) homeUploadCount.textContent = String(uploads.length);
  const assignments = Array.isArray(data.assignments) ? data.assignments : [];
  if (homeTaskCount) homeTaskCount.textContent = String(assignments.filter((a) => String(a.status || "") !== "completed").length);
  if (homeLastUpload) homeLastUpload.textContent = uploads.length ? fmt(uploads[0].upload_date) : "--";
  renderUploads(uploads);
  renderTimeline(data.timeline || []);
}

document.getElementById("upload-btn").addEventListener("click", async () => {
  const file = uploadFile.files[0];
  if (!file) {
    setUploadStatus("请选择或拖拽要上传的图片", false);
    return;
  }
  setUploadStatus("上传中 0%...", true);
  setUploadProgress(0);
  const res = await uploadWithProgress(file);
  if (!res.ok) {
    setUploadStatus(`上传失败：${res.error?.message || "未知错误"}`, false);
    clearUploadProgress();
    return;
  }
  setUploadProgress(100);
  setUploadStatus("上传成功，医生端已收到待复核任务", true);
  uploadFile.value = "";
  setDropPreview(null);
  setTimeout(clearUploadProgress, 600);
  await loadPortal();
});

uploadList.addEventListener("click", async (event) => {
  const preview = event.target.closest("img[data-preview]");
  if (preview) {
    openImageModal(preview.getAttribute("data-preview"));
    return;
  }

  const btn = event.target.closest("button[data-delete-exam]");
  if (!btn) return;
  const examId = btn.getAttribute("data-delete-exam");
  if (!examId) return;
  if (!window.confirm("确认删除这张上传图吗？")) return;
  const res = await api(`/api/public/portal/${token}/exams/${examId}`, { method: "DELETE" });
  if (!res.ok) {
    setUploadStatus(`删除失败：${res.error?.message || "未知错误"}`, false);
    return;
  }
  setUploadStatus("上传图已删除", true);
  await loadPortal();
});

timelineList.addEventListener("click", (event) => {
  const preview = event.target.closest("img[data-preview]");
  if (preview) {
    openImageModal(preview.getAttribute("data-preview"));
  }
});

document.getElementById("modal-close").addEventListener("click", closeImageModal);
imageModal.addEventListener("click", (event) => {
  if (event.target === imageModal) closeImageModal();
});
document.addEventListener("keydown", (event) => {
  if (event.key === "Escape") closeImageModal();
});

bindPanelMenu();
bindUploadDnD();
updatePortalChatUnreadBadge();
loadChat();
portalChatSend?.addEventListener("click", sendChatMessage);
portalChatInput?.addEventListener("keydown", (event) => {
  if (event.key === "Enter") {
    event.preventDefault();
    sendChatMessage();
  }
});
window.addEventListener("beforeunload", () => {
  if (chatState.ws) {
    try { chatState.ws.close(); } catch (_err) {}
    chatState.ws = null;
  }
});
loadPortal();
</script>
</body>
</html>
