<!-- Example Selection Modal -->
<div id="example-modal" class="modal-backdrop" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
    <div class="modal-content" style="background:white; padding:20px; border-radius:12px; width:90%; max-width:600px; max-height:80vh; overflow-y:auto;">
        <h3 style="margin-top:0; color:#1e293b;">选择测试例图</h3>
        <div class="example-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; margin-top:15px;">
            <div onclick="selectExample(1)" class="ex-item"><img src="/static/img/compressed/1.png" loading="lazy"><span>Img 1</span></div>
            <div onclick="selectExample(2)" class="ex-item"><img src="/static/img/compressed/2.png" loading="lazy"><span>Img 2</span></div>
            <div onclick="selectExample(3)" class="ex-item"><img src="/static/img/compressed/3.png" loading="lazy"><span>Img 3</span></div>
            <div onclick="selectExample(4)" class="ex-item"><img src="/static/img/compressed/4.png" loading="lazy"><span>Img 4</span></div>
            <div onclick="selectExample(5)" class="ex-item"><img src="/static/img/compressed/5.png" loading="lazy"><span>Img 5</span></div>
            <div onclick="selectExample(6)" class="ex-item"><img src="/static/img/compressed/6.png" loading="lazy"><span>Img 6</span></div>
        </div>
        <button onclick="closeExampleModal()" style="margin-top:20px; padding:8px 20px; border:none; background:#e2e8f0; border-radius:6px; cursor:pointer; color:#475569;">关闭</button>
    </div>
    <style>
        .ex-item { border:2px solid #e2e8f0; border-radius:8px; overflow:hidden; cursor:pointer; transition:all 0.2s; text-align:center; padding-bottom:5px;}
        .ex-item:hover { border-color:#3b82f6; transform:translateY(-2px); box-shadow:0 4px 6px -1px rgba(0,0,0,0.1); }
        .ex-item img { width:100%; height:120px; object-fit:cover; display:block; margin-bottom:5px; background:#f1f5f9; }
        .ex-item span { font-size:12px; color:#64748b; font-weight:500; }
    </style>
</div>
