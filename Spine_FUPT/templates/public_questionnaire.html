<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>问卷填写</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #dbe2ea;
      --ink: #0f172a;
      --muted: #64748b;
      --brand: #0b1220;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    .wrap {
      max-width: 900px;
      margin: 16px auto;
      padding: 0 12px 18px;
      display: grid;
      gap: 12px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }
    .head-title {
      margin: 0;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: .01em;
    }
    .head-desc {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }
    .form-card {
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .q {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      display: grid;
      gap: 10px;
      background: #fff;
    }
    .q-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.5;
      color: #111827;
    }
    .q-options {
      display: grid;
      gap: 8px;
    }
    .q-option {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      font-size: 13px;
      color: #334155;
    }
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 96px;
      padding: 10px;
      font-size: 13px;
      resize: vertical;
      color: #0f172a;
      background: #fff;
    }
    textarea:focus {
      outline: none;
      border-color: #0f172a;
      box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.1);
    }
    .submit-btn {
      border: 1px solid var(--brand);
      background: var(--brand);
      color: #fff;
      border-radius: 9px;
      min-height: 40px;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .submit-btn:hover { background: #000; border-color: #000; }
    .result-ok { border-color: #bbf7d0; background: #f0fdf4; color: #166534; }
    .result-err { border-color: #fecaca; background: #fef2f2; color: #991b1b; }
    .page-footer {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
      padding: 12px 14px;
      display: grid;
      gap: 6px;
      color: #64748b;
      font-size: 12px;
      line-height: 1.7;
    }
    .page-footer .brand {
      color: #0f172a;
      font-weight: 700;
      letter-spacing: .01em;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1 id="title" class="head-title">问卷</h1>
    <p id="desc" class="head-desc"></p>
  </div>
  <form id="form" class="card form-card"></form>
  <div id="result"></div>
  <footer class="page-footer">
    <div class="brand">Spine FUPT · Follow-Up Questionnaire</div>
  </footer>
</div>
<script>
const token = "{{ token }}";
const form = document.getElementById("form");
const footerYear = document.getElementById("footer-year");
if (footerYear) footerYear.textContent = String(new Date().getFullYear());

function api(path, options = {}) { return fetch(path, options).then(r => r.json()); }
function getCookie(name) {
  const key = `${name}=`;
  const parts = String(document.cookie || "").split(";").map(s => s.trim());
  for (const part of parts) {
    if (part.startsWith(key)) return decodeURIComponent(part.slice(key.length));
  }
  return "";
}
function ensureResponderCookie() {
  let rid = getCookie("spine_q_responder");
  if (!rid) {
    rid = `r_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
    document.cookie = `spine_q_responder=${encodeURIComponent(rid)}; path=/; max-age=${60 * 60 * 24 * 365}; samesite=lax`;
  }
  return rid;
}

function renderQuestion(q){
  const box = document.createElement("div");
  box.className = "q";
  box.dataset.id = q.id;
  box.innerHTML = `<div class="q-title">${q.title || "-"}</div>`;

  if (q.q_type === "text") {
    const area = document.createElement("textarea");
    area.name = `q_${q.id}`;
    area.placeholder = "请输入内容";
    box.appendChild(area);
  }

  if (q.q_type === "single") {
    const wrap = document.createElement("div");
    wrap.className = "q-options";
    (q.options || []).forEach(opt => {
      const label = document.createElement("label");
      label.className = "q-option";
      label.innerHTML = `<input type="radio" name="q_${q.id}" value="${String(opt).replace(/"/g,'&quot;')}"> <span>${opt}</span>`;
      wrap.appendChild(label);
    });
    box.appendChild(wrap);
  }

  if (q.q_type === "multi") {
    const wrap = document.createElement("div");
    wrap.className = "q-options";
    (q.options || []).forEach(opt => {
      const label = document.createElement("label");
      label.className = "q-option";
      label.innerHTML = `<input type="checkbox" name="q_${q.id}" value="${String(opt).replace(/"/g,'&quot;')}"> <span>${opt}</span>`;
      wrap.appendChild(label);
    });
    box.appendChild(wrap);
  }

  form.appendChild(box);
}

async function loadData(){
  const res = await api(`/api/public/questionnaires/${token}`);
  if (!res.ok) {
    form.innerHTML = `<div>加载失败：${res.error?.message || "未知错误"}</div>`;
    return;
  }

  const q = res.data.questionnaire;
  const assignment = res.data.assignment || {};
  document.getElementById("title").textContent = q.title;
  const desc = document.getElementById("desc");
  let descText = String(q.description || "").trim();
  if (q.open_from || q.open_until) {
    const openFrom = q.open_from ? new Date(q.open_from).toLocaleString() : "不限";
    const openUntil = q.open_until ? new Date(q.open_until).toLocaleString() : "不限";
    descText += `${descText ? "\n" : ""}开放时间：${openFrom} ~ ${openUntil}`;
  }
  desc.textContent = descText;
  desc.style.display = descText ? "block" : "none";

  form.innerHTML = "";
  if (assignment.already_submitted) {
    form.innerHTML = `<div class="q">该问卷已提交，不能重复填写。</div>`;
    return;
  }
  if (!q.open_ok) {
    form.innerHTML = `<div class="q">当前不在问卷开放时间内，暂不可填写。</div>`;
    return;
  }
  (q.questions || []).forEach(renderQuestion);
  form.innerHTML += `<button type="submit" class="submit-btn">提交问卷</button>`;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const answers = {};
  form.querySelectorAll(".q").forEach((qEl) => {
    const qid = qEl.dataset.id;
    const name = `q_${qid}`;
    const checkedRadios = form.querySelector(`input[type='radio'][name='${name}']:checked`);
    if (checkedRadios) {
      answers[qid] = checkedRadios.value;
      return;
    }
    const checks = Array.from(form.querySelectorAll(`input[type='checkbox'][name='${name}']:checked`));
    if (checks.length) {
      answers[qid] = checks.map(c => c.value);
      return;
    }
    const textEl = form.querySelector(`textarea[name='${name}']`);
    if (textEl) answers[qid] = textEl.value;
  });

  const res = await api(`/api/public/questionnaires/${token}/submit`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      answers,
      responder_cookie_id: ensureResponderCookie(),
      patient_cookie_token: getCookie("spine_patient_token")
    })
  });

  const result = document.getElementById("result");
  result.innerHTML = res.ok
    ? `<div class="card result-ok">提交成功。</div>`
    : `<div class="card result-err">提交失败：${res.error?.message || "未知错误"}</div>`;
});

loadData();
</script>
</body>
</html>
