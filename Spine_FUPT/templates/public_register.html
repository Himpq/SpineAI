<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>患者登记</title>
  <style>
    :root {
      --line: #d8dee6;
      --ink: #0f172a;
      --muted: #64748b;
      --panel: #ffffff;
      --bg: #f3f4f6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top right, #ffffff 0%, var(--bg) 58%);
      color: var(--ink);
    }
    .wrap {
      max-width: 980px;
      margin: 22px auto;
      padding: 0 14px;
      display: grid;
      gap: 12px;
    }
    .hero {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(140deg, #0b0b0b 0%, #1f2937 90%);
      color: #f8fafc;
      padding: 16px 18px;
      display: grid;
      gap: 6px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.2);
    }
    h1 { margin: 0; font-size: 22px; }
    .muted { color: #cbd5e1; font-size: 13px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      padding: 14px;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.05);
    }
    .form-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #edf1f5;
      padding-bottom: 10px;
      margin-bottom: 10px;
    }
    .form-head strong {
      font-size: 14px;
      letter-spacing: 0.02em;
    }
    .focus {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      font-size: 12px;
      border-radius: 999px;
      background: #111827;
      color: #e5e7eb;
      border: 1px solid #111827;
    }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    label {
      display: grid;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
    }
    input, textarea {
      width: 100%;
      border: 1px solid #d7dde5;
      border-radius: 9px;
      min-height: 40px;
      padding: 8px 10px;
      font-size: 13px;
      color: var(--ink);
      background: #fff;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #111827;
      box-shadow: 0 0 0 2px rgba(17, 24, 39, 0.12);
    }
    textarea { min-height: 100px; resize: vertical; }
    .actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    button {
      border: 1px solid #111827;
      border-radius: 9px;
      background: #111827;
      color: #fff;
      min-height: 38px;
      padding: 0 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    button:hover { background: #000; border-color: #000; }
    #sync-hint { color: var(--muted); font-size: 12px; }
    #submit-result { min-height: 8px; }
    .ok, .err {
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      border: 1px solid;
      background: #fff;
    }
    .ok { border-color: #bbf7d0; color: #166534; background: #f0fdf4; }
    .err { border-color: #fecaca; color: #991b1b; background: #fef2f2; }
    a { color: #0f172a; word-break: break-all; }
    @media (max-width:760px){
      .grid { grid-template-columns: 1fr; }
      .form-head { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>患者登记表</h1>
    <div class="muted">此页面与医生端实时同步，支持双向协作填写</div>
  </div>

  <form id="form" class="card">
    <div class="form-head">
      <strong>基本信息</strong>
      <div id="focus-box" class="focus">当前协作焦点：-</div>
    </div>
    <div class="grid">
      <label>姓名<input data-field="name" name="name" required></label>
      <label>年龄<input data-field="age" name="age" type="number"></label>
      <label>性别<input data-field="sex" name="sex" placeholder="男/女"></label>
      <label>电话<input data-field="phone" name="phone"></label>
      <label>邮箱<input data-field="email" name="email"></label>
    </div>
    <label style="margin-top:10px">备注<textarea data-field="note" name="note"></textarea></label>
    <div class="actions">
      <button type="submit">提交登记</button>
      <span id="sync-hint">实时同步中</span>
    </div>
  </form>

  <div id="submit-result"></div>
</div>
<script>
const token = "{{ token }}";
const focusBox = document.getElementById("focus-box");
const form = document.getElementById("form");
const submitResult = document.getElementById("submit-result");
let channel = `form:${token}`;
let ws = null;
let actor = `患者-${Math.random().toString(16).slice(2,6)}`;

function api(path, options = {}) {
  return fetch(path, options).then(r => r.json());
}

function setFormState(state = {}) {
  Object.keys(state).forEach((k) => {
    const el = form.querySelector(`[data-field="${k}"]`);
    if (el && document.activeElement !== el) {
      el.value = state[k] ?? "";
    }
  });
}

async function loadState() {
  const res = await api(`/api/public/register/${token}`);
  if (!res.ok) return;
  const data = res.data || {};
  channel = data.channel || channel;
  setFormState(data.form_state || {});
  if (data.focus_field) {
    focusBox.textContent = `当前协作焦点：${data.focus_field}`;
  }
}

function connectWS() {
  const protocol = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${protocol}://${location.host}/ws`);
  ws.onopen = () => {
    ws.send(JSON.stringify({type:"hello",kind:"patient",name:actor}));
    ws.send(JSON.stringify({type:"subscribe",channel}));
  };
  ws.onmessage = (evt) => {
    const data = JSON.parse(evt.data || "{}");
    if (data.type === "field_focus") {
      focusBox.textContent = `当前协作焦点：${data.field || "-"}（${data.actor_name || "协作端"}）`;
    }
    if (data.type === "field_change") {
      const el = form.querySelector(`[data-field="${data.field}"]`);
      if (el && document.activeElement !== el) el.value = data.value ?? "";
    }
    if (data.type === "form_submit") {
      submitResult.innerHTML = `<div class="ok">登记已提交。${data.patient?.portal_url ? `患者入口：<a href="${data.patient.portal_url}" target="_blank">${data.patient.portal_url}</a>` : ""}</div>`;
    }
  };
  ws.onclose = () => setTimeout(connectWS, 2000);
}

form.querySelectorAll("[data-field]").forEach((el) => {
  el.addEventListener("focus", () => {
    api(`/api/public/register/${token}/focus`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({field: el.dataset.field, actor_name: actor})
    });
  });

  el.addEventListener("input", () => {
    api(`/api/public/register/${token}/field`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({field: el.dataset.field, value: el.value, actor_name: actor})
    });
  });
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const state = {};
  form.querySelectorAll("[data-field]").forEach((el) => state[el.dataset.field] = el.value);
  const res = await api(`/api/public/register/${token}/submit`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({actor_name: actor, form_state: state})
  });
  if (!res.ok) {
    submitResult.innerHTML = `<div class="err">提交失败：${res.error?.message || "未知错误"}</div>`;
    return;
  }
  submitResult.innerHTML = `<div class="ok">登记成功。患者入口：<a href="${res.data.portal_url}" target="_blank">${res.data.portal_url}</a></div>`;
});

loadState();
connectWS();
</script>
</body>
</html>
