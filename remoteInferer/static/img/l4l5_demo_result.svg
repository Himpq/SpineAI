<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 360" width="640" height="720">
  <rect width="100%" height="100%" fill="#0d0f11"/>
  <g transform="translate(20,20)">
    <rect x="0" y="0" width="280" height="320" rx="6" fill="#0b0c0e" stroke="#222"/>
    <g fill="#fff" font-size="12" opacity="0.9">
      <text x="12" y="18">L4/L5 Demo Result</text>
      <text x="12" y="34" font-size="11" fill="#9aa3ad">示例：关键点与多边形标注</text>
    </g>

    <!-- L4 polygon -->
    <polygon points="50,120 110,120 110,80 50,80" fill="#ffefb5" stroke="#ffb74d" stroke-width="2" opacity="0.9"/>
    <text x="60" y="116" font-size="11" fill="#6b4b00">L4</text>

    <!-- L5 polygon -->
    <polygon points="70,200 130,200 130,160 70,160" fill="#bdf7e0" stroke="#20c997" stroke-width="2" opacity="0.95"/>
    <text x="82" y="196" font-size="11" fill="#00573a">L5</text>

    <!-- small markers -->
    <circle cx="50" cy="120" r="3" fill="#222" stroke="#fff"/>
    <circle cx="110" cy="120" r="3" fill="#222" stroke="#fff"/>
    <circle cx="70" cy="200" r="3" fill="#222" stroke="#fff"/>
    <circle cx="130" cy="200" r="3" fill="#222" stroke="#fff"/>

  </g>
</svg>